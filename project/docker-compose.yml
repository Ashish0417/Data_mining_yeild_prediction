version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: data_mining_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: crop_yield_db
      MYSQL_USER: cropuser
      MYSQL_PASSWORD: croppassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:alpine
    container_name: data_mining_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: data_mining_backend
    restart: always
    environment:
      - DATABASE_URL=mysql+pymysql://cropuser:croppassword@db:3306/crop_yield_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretkey_change_in_production
    ports:
      - "8001:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: data_mining_frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
